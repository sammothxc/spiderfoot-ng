[tool.bumpversion]
current_version = "4.4.8"
parse = '(?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)'
serialize = ["{major}.{minor}.{patch}"]
commit = true
tag = true
tag_name = "v{new_version}"
tag_message = "Release v{new_version}"
message = "chore: release v{new_version}"
allow_dirty = false

# Canonical source of truth: the Python version tuple.
[[tool.bumpversion.files]]
filename = "spiderfoot/__version__.py"
search = "VERSION = ({current_major}, {current_minor}, {current_patch})"
replace = "VERSION = ({new_major}, {new_minor}, {new_patch})"

# Derived: human-readable VERSION marker file (kept in sync automatically).
[[tool.bumpversion.files]]
filename = "VERSION"
search = "spiderfoot-ng {current_version}"
replace = "spiderfoot-ng {new_version}"

# Packaging metadata version, kept in sync for PyPI builds.
[[tool.bumpversion.files]]
filename = "pyproject.toml"
search = "version = \"{current_version}\""
replace = "version = \"{new_version}\""
