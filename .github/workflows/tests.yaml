name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel any in-progress run for the same branch/PR when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Linting is Python-version independent, so it runs once. Pinned to
          # 3.13 because some flake8 plugins (e.g. flake8-return) are unmaintained
          # and not yet compatible with Python 3.14.
          python-version: "3.13"
      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r test/lint-requirements.txt
      - name: Lint with flake8
        run: |
          # stop the build if there are Python Flake8 violations
          flake8 . --count --show-source --statistics

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      # Cancel the remaining matrix jobs as soon as one fails.
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r test/requirements.txt
      - name: Test with pytest
        run: |
          # Hermetic run: block all network (any stray live call fails fast
          # instead of hanging) and skip tests explicitly marked as needing it.
          python -m pytest test/unit \
            -m "not network" \
            --disable-socket --allow-unix-socket \
            --durations=5
