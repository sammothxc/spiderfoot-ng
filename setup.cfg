[flake8]
exclude = .git,__pycache__,.venv,venv,build,dist,*.egg-info
flake8-max-line-length = 120
max-complexity = 60
docstring-convention = google
ignore-decorators = property
select = C,E,F,W,B,B9,DAR,DUO,R,A,S,Q0,SIM,SFS
# Note: B902, B907, B036, B908 and ANN should be fixed instead of ignored
extend-ignore = E501 W503 B006 B950 SFS301 SF01 Q000 B902 B907 B036 B908 ANN
# Note: most of these should be fixed instead of ignored
per-file-ignores =
    spiderfoot/event.py:A003
    spiderfoot/db.py:SFS101
    modules/*:SIM102,SIM113,SIM114
    modules/sfp_alienvault.py:C901
    modules/sfp_binaryedge.py:C901
    modules/sfp_bitcoin.py:SFS101
    spiderfoot/__init__.py:F401
    sfcli.py:DAR
    sfwebui.py:A001,A002,B905
    test/*:SIM117,B904,ANN
    docs/conf.py:A

[darglint]
docstring_style=google

[tool:pytest]
# Bound every test so a stray blocking call fails loudly instead of hanging
# the job forever (see "fix ci/cd hanging forever"). Thread method works for
# tests that block in C-level I/O without releasing the GIL.
addopts = --timeout=120 --timeout-method=thread
markers =
    network: test performs live network I/O (deselected in CI via -m "not network")
